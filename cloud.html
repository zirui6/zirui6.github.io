<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>梓睿网盘 · 文件分享</title>
    <style>
        /* ============================================================
           全局样式
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --bg-hover: #f5f6fa;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #8a8aaa;
            --border-color: #e0e0e8;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 4px 24px rgba(0, 0, 0, 0.12);
            --accent: #4a6cf7;
            --accent-light: rgba(74, 108, 247, 0.10);
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.3s ease;
            --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
        }

        [data-theme="dark"] {
            --bg-body: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-hover: #252540;
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0c0;
            --text-muted: #666688;
            --border-color: #2a2a45;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 4px 24px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: var(--font);
            background: var(--bg-body);
            min-height: 100vh;
            padding: 20px;
            transition: background var(--transition);
        }

        /* ============================================================
           顶部导航
           ============================================================ */
        .header {
            max-width: 1200px;
            margin: 0 auto 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-left .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-left .logo span {
            background: linear-gradient(135deg, #4a6cf7, #6c4af7);
            color: #fff;
            padding: 4px 12px;
            border-radius: var(--radius-sm);
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header-actions .user-info {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(74, 108, 247, 0.35);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-danger:hover {
            opacity: 0.85;
        }

        .btn-danger:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-success {
            background: var(--success);
            color: #fff;
        }

        .btn-success:hover {
            opacity: 0.85;
        }

        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }

        .btn-guest {
            background: var(--warning);
            color: #fff;
        }

        .btn-guest:hover {
            opacity: 0.85;
        }

        /* ============================================================
           登录提示横幅
           ============================================================ */
        .login-banner {
            max-width: 1200px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border: 1px solid #f59e0b;
            border-radius: var(--radius);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            color: #78350f;
        }

        [data-theme="dark"] .login-banner {
            background: linear-gradient(135deg, #2d1f00, #3d2b00);
            border-color: #f59e0b;
            color: #fbbf24;
        }

        .login-banner .banner-text {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .login-banner .banner-text .icon {
            font-size: 20px;
        }

        .login-banner .btn {
            flex-shrink: 0;
        }

        /* ============================================================
           上传区域
           ============================================================ */
        .upload-area {
            max-width: 1200px;
            margin: 0 auto 24px;
            background: var(--bg-card);
            border: 2px dashed var(--border-color);
            border-radius: var(--radius);
            padding: 40px 20px;
            text-align: center;
            transition: all var(--transition);
            position: relative;
            cursor: pointer;
        }

        .upload-area:hover:not(.disabled) {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .upload-area.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .upload-area.disabled:hover {
            border-color: var(--border-color);
            background: transparent;
        }

        .upload-area.dragover {
            border-color: var(--accent);
            background: var(--accent-light);
            transform: scale(1.01);
        }

        .upload-area .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .upload-area h3 {
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .upload-area p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .upload-area .login-hint {
            color: var(--warning);
            font-size: 13px;
            margin-top: 8px;
            font-weight: 600;
        }

        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-area.disabled input[type="file"] {
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ============================================================
           文件列表
           ============================================================ */
        .file-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .file-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .file-toolbar .stats {
            color: var(--text-muted);
            font-size: 14px;
        }

        .file-toolbar .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            padding: 6px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            transition: border-color var(--transition);
        }

        .file-toolbar .search-box:focus-within {
            border-color: var(--accent);
        }

        .file-toolbar .search-box input {
            border: none;
            background: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            padding: 4px 0;
            width: 180px;
        }

        .file-toolbar .search-box input::placeholder {
            color: var(--text-muted);
        }

        /* ============================================================
           文件网格
           ============================================================ */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .file-item {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            transition: all var(--transition);
            border: 1px solid var(--border-color);
            position: relative;
        }

        .file-item:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .file-item .file-icon {
            font-size: 40px;
            text-align: center;
            padding: 12px 0;
        }

        .file-item .file-name {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .file-item .file-meta {
            color: var(--text-muted);
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
        }

        .file-item .file-actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .file-item .file-actions .btn {
            flex: 1;
            justify-content: center;
            min-width: 60px;
        }

        .file-item .file-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 11px;
            background: var(--bg-hover);
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        /* ============================================================
           链接分享区域（类似4275.com样式）
           ============================================================ */
        .share-link {
            background: var(--bg-hover);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 13px;
            border: 1px solid var(--border-color);
        }

        .share-link a {
            color: var(--accent);
            text-decoration: none;
            word-break: break-all;
            flex: 1;
            font-size: 12px;
        }

        .share-link a:hover {
            text-decoration: underline;
        }

        .share-link .copy-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 2px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
        }

        .share-link .copy-btn:hover {
            background: #3a5cd5;
        }

        .share-link .copy-btn.copied {
            background: var(--success);
        }

        /* ============================================================
           空状态
           ============================================================ */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        /* ============================================================
           进度条
           ============================================================ */
        .upload-progress {
            max-width: 1200px;
            margin: 0 auto 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow);
            display: none;
            border: 1px solid var(--border-color);
        }

        .upload-progress.active {
            display: block;
        }

        .upload-progress .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .upload-progress .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #6c4af7);
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .upload-progress .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* ============================================================
           响应式
           ============================================================ */
        @media (max-width: 640px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }

            .header-left .logo {
                font-size: 20px;
            }

            .file-grid {
                grid-template-columns: 1fr;
            }

            .file-toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .file-toolbar .search-box input {
                width: 100%;
            }

            .share-link {
                flex-wrap: wrap;
            }

            .share-link a {
                font-size: 11px;
                width: 100%;
            }

            .login-banner {
                flex-direction: column;
                text-align: center;
            }
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-hover);
            border: 1px solid var(--border-color);
            font-size: 14px;
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 1000;
            pointer-events: none;
            max-width: 90%;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }

        .toast.error {
            border-left: 4px solid var(--danger);
        }

        .toast.warning {
            border-left: 4px solid var(--warning);
        }
    </style>
</head>
<body>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- ============================================================
    顶部导航
    ============================================================ -->
    <header class="header">
        <div class="header-left">
            <a href="#" class="logo">
                📁 梓睿网盘
                <span>Beta</span>
            </a>
        </div>
        <div class="header-actions">
            <span class="user-info" id="userInfo">👤 游客模式</span>
            <button class="btn btn-secondary" id="themeToggle">🌙</button>
            <button class="btn btn-guest btn-sm" id="loginBtn">🔑 登录</button>
            <button class="btn btn-danger btn-sm" id="logoutBtn" style="display:none;">退出</button>
        </div>
    </header>

    <!-- ============================================================
    登录提示横幅
    ============================================================ -->
    <div class="login-banner" id="loginBanner">
        <div class="banner-text">
            <span class="icon">🔓</span>
            <span>您正在以游客模式浏览，<strong>上传、删除</strong>等功能需要登录</span>
        </div>
        <button class="btn btn-primary btn-sm" onclick="window.location.href='login.html'">立即登录</button>
    </div>

    <!-- ============================================================
    上传进度
    ============================================================ -->
    <div class="upload-progress" id="uploadProgress">
        <div class="progress-info">
            <span id="progressFileName">正在上传...</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
            <div class="fill" id="progressFill"></div>
        </div>
    </div>

    <!-- ============================================================
    上传区域
    ============================================================ -->
    <div class="upload-area" id="uploadArea">
        <div class="icon">📤</div>
        <h3>点击或拖拽上传文件</h3>
        <p>支持所有文件类型，最大 100MB</p>
        <div class="login-hint" id="uploadHint">🔒 登录后即可上传文件</div>
        <input type="file" multiple id="fileInput" disabled />
    </div>

    <!-- ============================================================
    文件列表
    ============================================================ -->
    <div class="file-container">
        <div class="file-toolbar">
            <div class="stats" id="fileStats">共 0 个文件</div>
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="搜索文件..." />
            </div>
        </div>
        <div class="file-grid" id="fileGrid">
            <!-- 文件卡片由 JS 动态渲染 -->
        </div>
    </div>

    <!-- ============================================================
    Supabase SDK + 主逻辑
    ============================================================ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <script>
        // ============================================================
        // 1. 配置
        // ============================================================
        var SUPABASE_URL = 'https://supabase-api.ruijmsgdcn.workers.dev';
        var SUPABASE_ANON_KEY = 'sb_publishable_doQMNbNC84-qL5wrjNjejA_o4LV_B0X';
        var STORAGE_BUCKET = 'files';

        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // 2. DOM 引用
        // ============================================================
        var fileInput = document.getElementById('fileInput');
        var uploadArea = document.getElementById('uploadArea');
        var uploadHint = document.getElementById('uploadHint');
        var fileGrid = document.getElementById('fileGrid');
        var fileStats = document.getElementById('fileStats');
        var searchInput = document.getElementById('searchInput');
        var uploadProgress = document.getElementById('uploadProgress');
        var progressFill = document.getElementById('progressFill');
        var progressFileName = document.getElementById('progressFileName');
        var progressPercent = document.getElementById('progressPercent');
        var toast = document.getElementById('toast');
        var userInfo = document.getElementById('userInfo');
        var loginBtn = document.getElementById('loginBtn');
        var logoutBtn = document.getElementById('logoutBtn');
        var loginBanner = document.getElementById('loginBanner');

        // ============================================================
        // 3. Cookie 工具
        // ============================================================
        var CookieHelper = {
            get: function(name) {
                var nameEQ = name + '=';
                var ca = document.cookie.split(';');
                for (var i = 0; i < ca.length; i++) {
                    var c = ca[i];
                    while (c.charAt(0) === ' ') c = c.substring(1, c.length);
                    if (c.indexOf(nameEQ) === 0) {
                        return decodeURIComponent(c.substring(nameEQ.length, c.length));
                    }
                }
                return null;
            },
            set: function(name, value, days) {
                var expires = '';
                if (days) {
                    var date = new Date();
                    date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                    expires = '; expires=' + date.toUTCString();
                }
                document.cookie = name + '=' + encodeURIComponent(value) + expires + '; path=/; SameSite=Lax';
            },
            delete: function(name) {
                document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            }
        };

        // ============================================================
        // 4. Toast 提示
        // ============================================================
        var toastTimer = null;

        function showToast(message, type) {
            toast.textContent = message;
            toast.className = 'toast ' + (type || '') + ' show';
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function() {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        // 5. 深色模式
        // ============================================================
        var themeToggle = document.getElementById('themeToggle');
        var currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        themeToggle.textContent = currentTheme === 'dark' ? '☀️' : '🌙';

        themeToggle.addEventListener('click', function() {
            var newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        });

        // ============================================================
        // 6. 登录状态管理
        // ============================================================
        var isLoggedIn = false;
        var currentUser = null;

        function checkLoginStatus() {
            var cookieLoggedIn = CookieHelper.get('isLoggedIn') === 'true';
            var sessionLoggedIn = sessionStorage.getItem('isLoggedIn') === 'true';
            var userId = CookieHelper.get('userId') || sessionStorage.getItem('userId');
            var displayName = CookieHelper.get('displayName') || sessionStorage.getItem('displayName');

            isLoggedIn = cookieLoggedIn || sessionLoggedIn;

            if (isLoggedIn && userId) {
                currentUser = {
                    id: userId,
                    displayName: displayName || '用户'
                };
                updateUIForLoggedIn();
            } else {
                currentUser = null;
                updateUIForGuest();
            }
        }

        function updateUIForLoggedIn() {
            userInfo.textContent = '👤 ' + (currentUser ? currentUser.displayName : '已登录');
            loginBtn.textContent = '👤 已登录';
            loginBtn.style.background = 'var(--success)';
            logoutBtn.style.display = 'inline-flex';
            loginBanner.style.display = 'none';
            uploadArea.classList.remove('disabled');
            fileInput.disabled = false;
            uploadHint.textContent = '📤 点击或拖拽上传文件';
            uploadHint.style.color = 'var(--text-muted)';
            showToast('✅ 已登录，可以使用完整功能', 'success');
        }

        function updateUIForGuest() {
            userInfo.textContent = '👤 游客模式';
            loginBtn.textContent = '🔑 登录';
            loginBtn.style.background = '';
            logoutBtn.style.display = 'none';
            loginBanner.style.display = 'flex';
            uploadArea.classList.add('disabled');
            fileInput.disabled = true;
            uploadHint.textContent = '🔒 登录后即可上传文件';
            uploadHint.style.color = 'var(--warning)';
        }

        // ============================================================
        // 7. 登录/退出按钮
        // ============================================================
        loginBtn.addEventListener('click', function() {
            if (isLoggedIn) {
                // 如果已登录，跳转到仪表板
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'login.html';
            }
        });

        logoutBtn.addEventListener('click', function() {
            if (confirm('确定要退出登录吗？')) {
                sessionStorage.clear();
                CookieHelper.delete('isLoggedIn');
                CookieHelper.delete('userId');
                CookieHelper.delete('userEmail');
                CookieHelper.delete('displayName');
                CookieHelper.delete('role');
                CookieHelper.delete('userSession');
                CookieHelper.delete('sb-auth-token');
                isLoggedIn = false;
                currentUser = null;
                updateUIForGuest();
                uploadedFiles = [];
                renderFiles([]);
                showToast('👋 已退出登录，切换到游客模式', 'success');
            }
        });

        // ============================================================
        // 8. 文件操作
        // ============================================================
        var uploadedFiles = [];
        var guestFiles = []; // 游客模式下的演示文件

        // 生成分享链接
        function generateShareLink(fileName) {
            var chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            var code = '';
            for (var i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return 'http://4275.com/' + code;
        }

        // 格式化文件大小
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            var k = 1024;
            var sizes = ['B', 'KB', 'MB', 'GB'];
            var i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 获取文件图标
        function getFileIcon(fileName) {
            var ext = fileName.split('.').pop().toLowerCase();
            var icons = {
                'jpg': '🖼️',
                'jpeg': '🖼️',
                'png': '🖼️',
                'gif': '🖼️',
                'svg': '🖼️',
                'webp': '🖼️',
                'mp4': '🎬',
                'avi': '🎬',
                'mkv': '🎬',
                'mov': '🎬',
                'mp3': '🎵',
                'wav': '🎵',
                'flac': '🎵',
                'pdf': '📄',
                'doc': '📝',
                'docx': '📝',
                'xls': '📊',
                'xlsx': '📊',
                'ppt': '📽️',
                'pptx': '📽️',
                'zip': '📦',
                'rar': '📦',
                '7z': '📦',
                'txt': '📃',
                'js': '💻',
                'html': '🌐',
                'css': '🎨',
                'json': '📋',
                'xml': '📋',
                'py': '🐍',
                'java': '☕',
                'cpp': '⚙️',
                'c': '⚙️',
                'go': '🐹',
                'rs': '🦀',
            };
            return icons[ext] || '📎';
        }

        // 生成示例文件（游客模式）
        function generateGuestFiles() {
            var sampleFiles = [
                { name: '示例文档.pdf', size: 2457600, icon: '📄' },
                { name: '项目截图.png', size: 1024000, icon: '🖼️' },
                { name: '音乐欣赏.mp3', size: 5120000, icon: '🎵' },
                { name: '视频教程.mp4', size: 15360000, icon: '🎬' },
                { name: '数据表格.xlsx', size: 512000, icon: '📊' },
                { name: '代码文件.js', size: 25600, icon: '💻' },
            ];

            guestFiles = sampleFiles.map(function(f, index) {
                return {
                    id: 'guest_' + index,
                    name: f.name,
                    size: f.size,
                    icon: f.icon,
                    shareLink: generateShareLink(f.name),
                    createdAt: new Date(Date.now() - index * 3600000).toLocaleString(),
                    isGuest: true,
                    url: '#'
                };
            });
        }

        // 渲染文件列表
        function renderFiles(files) {
            var displayFiles = files || uploadedFiles;

            if (!displayFiles || displayFiles.length === 0) {
                fileGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="icon">📭</div>
                        <h3>${isLoggedIn ? '还没有文件' : '登录后查看你的文件'}</h3>
                        <p>${isLoggedIn ? '点击上方区域上传你的第一个文件' : '游客模式下仅展示示例文件，登录后管理你的文件'}</p>
                        ${!isLoggedIn ? '<button class="btn btn-primary" style="margin-top:12px;" onclick="window.location.href=\'login.html\'">立即登录</button>' : ''}
                    </div>
                `;
                fileStats.textContent = '共 0 个文件';
                return;
            }

            fileStats.textContent = '共 ' + displayFiles.length + ' 个文件';

            var html = '';
            for (var i = 0; i < displayFiles.length; i++) {
                var file = displayFiles[i];
                var shareLink = file.shareLink || generateShareLink(file.name);
                var icon = file.icon || getFileIcon(file.name);
                var size = formatSize(file.size || 0);
                var isGuest = file.isGuest || false;

                html += `
                    <div class="file-item" data-id="${file.id || i}">
                        ${isGuest ? '<div class="file-badge">📌 示例</div>' : ''}
                        <div class="file-icon">${icon}</div>
                        <div class="file-name" title="${file.name}">${file.name}</div>
                        <div class="file-meta">
                            <span>${size}</span>
                            <span>${file.createdAt || '刚刚'}</span>
                        </div>
                        <div class="file-actions">
                            <button class="btn btn-primary btn-sm" onclick="downloadFile('${file.id || i}')" ${file.url === '#' ? 'disabled' : ''}>⬇️ 下载</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteFile('${file.id || i}')" ${isGuest || !isLoggedIn ? 'disabled' : ''}>🗑️</button>
                        </div>
                        <div class="share-link">
                            <a href="${shareLink}" target="_blank">${shareLink}</a>
                            <button class="copy-btn" onclick="copyLink(this, '${shareLink}')">复制</button>
                        </div>
                    </div>
                `;
            }

            fileGrid.innerHTML = html;
        }

        // ============================================================
        // 9. 复制链接
        // ============================================================
        window.copyLink = function(btn, link) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(link).then(function() {
                    btn.textContent = '已复制 ✓';
                    btn.classList.add('copied');
                    showToast('✅ 链接已复制到剪贴板', 'success');
                    setTimeout(function() {
                        btn.textContent = '复制';
                        btn.classList.remove('copied');
                    }, 2000);
                }).catch(function() {
                    fallbackCopy(link, btn);
                });
            } else {
                fallbackCopy(link, btn);
            }
        };

        function fallbackCopy(link, btn) {
            var tempInput = document.createElement('input');
            tempInput.value = link;
            document.body.appendChild(tempInput);
            tempInput.select();
            try {
                document.execCommand('copy');
                btn.textContent = '已复制 ✓';
                btn.classList.add('copied');
                showToast('✅ 链接已复制到剪贴板', 'success');
                setTimeout(function() {
                    btn.textContent = '复制';
                    btn.classList.remove('copied');
                }, 2000);
            } catch (e) {
                showToast('❌ 复制失败，请手动复制', 'error');
            }
            document.body.removeChild(tempInput);
        }

        // ============================================================
        // 10. 上传文件
        // ============================================================
        async function uploadFiles(files) {
            if (!files || files.length === 0) return;

            if (!isLoggedIn) {
                showToast('🔒 请先登录再上传文件', 'warning');
                return;
            }

            var userId = CookieHelper.get('userId') || sessionStorage.getItem('userId');
            if (!userId) {
                showToast('🔒 请先登录再上传文件', 'warning');
                return;
            }

            uploadProgress.classList.add('active');

            for (var i = 0; i < files.length; i++) {
                var file = files[i];
                var filePath = userId + '/' + Date.now() + '_' + file.name;

                progressFileName.textContent = '📤 上传: ' + file.name;

                try {
                    var { data, error } = await supabase.storage
                        .from(STORAGE_BUCKET)
                        .upload(filePath, file, {
                            cacheControl: '3600',
                            upsert: false,
                            onProgress: function(progress) {
                                var percent = Math.round((progress.loaded / progress.total) * 100);
                                progressFill.style.width = percent + '%';
                                progressPercent.textContent = percent + '%';
                            }
                        });

                    if (error) {
                        console.error('上传失败:', error);
                        showToast('❌ 上传失败: ' + error.message, 'error');
                        continue;
                    }

                    var { data: urlData } = supabase.storage
                        .from(STORAGE_BUCKET)
                        .getPublicUrl(filePath);

                    var fileInfo = {
                        id: Date.now() + '_' + i,
                        name: file.name,
                        size: file.size,
                        path: filePath,
                        url: urlData.publicUrl,
                        shareLink: generateShareLink(file.name),
                        createdAt: new Date().toLocaleString(),
                        userId: userId,
                        isGuest: false
                    };

                    uploadedFiles.unshift(fileInfo);
                    renderFiles(uploadedFiles);
                    showToast('✅ 上传成功: ' + file.name, 'success');

                } catch (err) {
                    console.error('上传异常:', err);
                    showToast('❌ 上传异常: ' + err.message, 'error');
                }
            }

            uploadProgress.classList.remove('active');
            progressFill.style.width = '0%';
            progressPercent.textContent = '0%';
        }

        // ============================================================
        // 11. 下载文件
        // ============================================================
        window.downloadFile = function(fileId) {
            var allFiles = uploadedFiles.length > 0 ? uploadedFiles : guestFiles;
            var file = allFiles.find(function(f) { return f.id == fileId; });
            if (!file) {
                showToast('❌ 文件不存在', 'error');
                return;
            }

            if (file.isGuest) {
                showToast('📌 这是示例文件，仅供预览', 'warning');
                return;
            }

            if (file.url && file.url !== '#') {
                window.open(file.url, '_blank');
                showToast('📥 正在下载: ' + file.name, 'success');
            } else {
                showToast('❌ 无法获取下载链接', 'error');
            }
        };

        // ============================================================
        // 12. 删除文件
        // ============================================================
        window.deleteFile = function(fileId) {
            if (!isLoggedIn) {
                showToast('🔒 请先登录再删除文件', 'warning');
                return;
            }

            var index = uploadedFiles.findIndex(function(f) { return f.id == fileId; });
            if (index === -1) {
                showToast('❌ 文件不存在', 'error');
                return;
            }

            var file = uploadedFiles[index];
            if (file.isGuest) {
                showToast('📌 示例文件不能删除', 'warning');
                return;
            }

            if (!confirm('确定要删除这个文件吗？')) return;

            supabase.storage
                .from(STORAGE_BUCKET)
                .remove([file.path])
                .then(function(result) {
                    if (result.error) {
                        console.warn('删除存储文件失败:', result.error);
                    }
                    uploadedFiles.splice(index, 1);
                    renderFiles(uploadedFiles);
                    showToast('🗑️ 已删除: ' + file.name, 'success');
                })
                .catch(function(err) {
                    console.error('删除失败:', err);
                    uploadedFiles.splice(index, 1);
                    renderFiles(uploadedFiles);
                    showToast('⚠️ 本地已移除: ' + file.name, 'error');
                });
        };

        // ============================================================
        // 13. 搜索功能
        // ============================================================
        searchInput.addEventListener('input', function() {
            var keyword = this.value.trim().toLowerCase();
            var sourceFiles = uploadedFiles.length > 0 ? uploadedFiles : guestFiles;
            if (!keyword) {
                renderFiles(sourceFiles);
                return;
            }
            var filtered = sourceFiles.filter(function(f) {
                return f.name.toLowerCase().includes(keyword);
            });
            renderFiles(filtered);
        });

        // ============================================================
        // 14. 上传事件
        // ============================================================
        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                uploadFiles(this.files);
            }
            this.value = '';
        });

        uploadArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            if (!isLoggedIn) return;
            this.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
            if (!isLoggedIn) {
                showToast('🔒 请先登录再上传文件', 'warning');
                return;
            }
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                uploadFiles(e.dataTransfer.files);
            }
        });

        uploadArea.addEventListener('click', function(e) {
            if (e.target.tagName !== 'INPUT' && isLoggedIn) {
                fileInput.click();
            } else if (!isLoggedIn) {
                showToast('🔒 请先登录再上传文件', 'warning');
            }
        });

        // ============================================================
        // 15. 初始化
        // ============================================================
        // 检查登录状态
        checkLoginStatus();

        // 生成示例文件
        generateGuestFiles();

        // 显示文件（游客模式显示示例文件，登录后显示用户文件）
        if (isLoggedIn) {
            // 尝试从localStorage恢复用户文件
            var savedFiles = localStorage.getItem('uploadedFiles_' + (currentUser ? currentUser.id : ''));
            if (savedFiles) {
                try {
                    uploadedFiles = JSON.parse(savedFiles);
                } catch (e) {
                    uploadedFiles = [];
                }
            }
            renderFiles(uploadedFiles);
        } else {
            renderFiles(guestFiles);
        }

        // 保存用户文件到localStorage
        window.addEventListener('beforeunload', function() {
            if (isLoggedIn && currentUser) {
                localStorage.setItem('uploadedFiles_' + currentUser.id, JSON.stringify(uploadedFiles));
            }
        });

        // 监听登录状态变化（其他标签页）
        window.addEventListener('storage', function(e) {
            if (e.key === 'isLoggedIn') {
                checkLoginStatus();
                if (isLoggedIn) {
                    renderFiles(uploadedFiles);
                } else {
                    renderFiles(guestFiles);
                }
            }
        });

        console.log('✅ 梓睿网盘已加载 (游客模式可用)');
        console.log('📁 存储桶:', STORAGE_BUCKET);
        console.log('🔗 Supabase URL:', SUPABASE_URL);
        console.log('👤 登录状态:', isLoggedIn ? '已登录' : '游客');
    </script>
</body>
</html>
