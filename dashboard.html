<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>仪表盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d1117, #161b22);
            padding: 20px;
        }
        .dashboard {
            background: #ffffff;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 640px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }
        .dashboard .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .dashboard h1 {
            font-size: 26px;
            color: #0d1117;
            margin-bottom: 6px;
        }
        .dashboard .subtitle {
            color: #57606a;
            font-size: 15px;
            margin-bottom: 24px;
        }
        .user-info {
            background: #f6f8fa;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 28px;
            border: 1px solid #d0d7de;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .user-info .name {
            font-weight: 600;
            color: #0d1117;
        }
        .user-info .badge {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 20px;
            background: #d0d7de;
            color: #24292f;
        }
        .badge.superadmin {
            background: #0d1117;
            color: #ffffff;
        }
        .badge.demo {
            background: #f1f8e9;
            color: #2e7d32;
        }
        .download-section {
            margin: 24px 0 28px;
        }
        .download-section h3 {
            font-size: 15px;
            font-weight: 600;
            color: #24292f;
            margin-bottom: 14px;
            letter-spacing: 0.3px;
        }
        .download-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: #f6f8fa;
            border-radius: 12px;
            border: 1px solid #d0d7de;
            margin-bottom: 10px;
            transition: background 0.2s;
        }
        .download-item:hover {
            background: #edf0f2;
        }
        .download-item .info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .download-item .info .num {
            font-weight: 700;
            color: #8b949e;
            font-size: 14px;
            min-width: 28px;
        }
        .download-item .info .desc {
            font-size: 14px;
            color: #24292f;
            word-break: break-all;
        }
        .download-item .info .desc .tag {
            font-size: 11px;
            background: #d0d7de;
            padding: 2px 10px;
            border-radius: 12px;
            color: #57606a;
            margin-left: 8px;
        }
        .btn-download {
            padding: 6px 18px;
            background: #0d1117;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .btn-download:hover {
            background: #1f2937;
        }
        .btn-download.primary {
            background: #1a60ed;
        }
        .btn-download.primary:hover {
            background: #1550c9;
        }
        .btn-logout {
            padding: 12px 36px;
            background: #cf222e;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.25s;
            width: 100%;
        }
        .btn-logout:hover {
            background: #a0111f;
        }
        .btn-back {
            display: inline-block;
            margin-top: 12px;
            color: #57606a;
            text-decoration: none;
            font-size: 14px;
            text-align: center;
            width: 100%;
        }
        .btn-back:hover {
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            .dashboard {
                padding: 32px 20px;
            }
            .download-item {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .btn-download {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="icon">📁</div>
        <h1>登录成功 ✅</h1>
        <p class="subtitle">欢迎回到管理后台</p>

        <div class="user-info">
            <span class="name" id="displayUser">—</span>
            <span class="badge" id="roleBadge">—</span>
        </div>

        <!-- ====== 三个下载链接 ====== -->
        <div class="download-section">
            <h3>📥 文件下载</h3>

            <!-- 链接 1 -->
            <div class="download-item">
                <div class="info">
                    <span class="num">#1</span>
                    <span class="desc">4275.com/55etdq</span>
                </div>
                <a href="https://4275.com/55etdq" target="_blank" class="btn-download primary">下载</a>
            </div>

            <!-- 链接 2 -->
            <div class="download-item">
                <div class="info">
                    <span class="num">#2</span>
                    <span class="desc">
                        2fa注册码备份（原始版-密码同登录密码）
                        <span class="tag">请用自动验证或登陆器</span>
                    </span>
                </div>
                <a href="https://raw.githubusercontent.com/zirui6/zirui6.github.io/refs/heads/main/2fa%E6%B3%A8%E5%86%8C%E7%A0%81%E5%A4%87%E4%BB%BD%EF%BC%88%E5%8E%9F%E5%A7%8B%E7%89%88-%E5%AF%86%E7%A0%81%E5%90%8C%E7%99%BB%E5%BD%95%E5%AF%86%E7%A0%81-%E8%AF%B7%E7%94%A8%E8%87%AA%E5%8A%A8%E9%AA%8C%E8%AF%81%E6%88%96%E7%99%BB%E9%99%86%E5%99%A8%EF%BC%89.zip" target="_blank" class="btn-download primary">下载</a>
            </div>

            <!-- 链接 3 -->
            <div class="download-item">
                <div class="info">
                    <span class="num">#3</span>
                    <span class="desc">zirui6-2fa.zip</span>
                </div>
                <a href="https://raw.githubusercontent.com/zirui6/zirui6.github.io/refs/heads/main/zirui6-2fa.zip" target="_blank" class="btn-download primary">下载</a>
            </div>
        </div>

        <button class="btn-logout" onclick="handleLogout()">退出登录</button>
        <a href="admin.html" class="btn-back">← 返回登录页</a>
    </div>

    <script>
        (function init() {
            const isLoggedIn = sessionStorage.getItem("isLoggedIn");
            const username = sessionStorage.getItem("username");
            const displayName = sessionStorage.getItem("displayName");
            const role = sessionStorage.getItem("role");

            if (isLoggedIn !== "true" || !username) {
                window.location.href = "admin.html";
                return;
            }

            document.getElementById("displayUser").textContent = displayName || username;

            const badge = document.getElementById("roleBadge");
            if (role === "superadmin") {
                badge.textContent = "超级管理员";
                badge.className = "badge superadmin";
            } else if (role === "demo") {
                badge.textContent = "演示账户";
                badge.className = "badge demo";
            }
        })();

        function handleLogout() {
            sessionStorage.removeItem("isLoggedIn");
            sessionStorage.removeItem("username");
            sessionStorage.removeItem("role");
            sessionStorage.removeItem("displayName");
            window.location.href = "admin.html";
        }
    </script>
</body>
</html>
